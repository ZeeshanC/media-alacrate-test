name: Deploy Angular App to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Uses a stable Node version

      - name: Install Dependencies
        run: npm ci --f

      - name: Build Angular Project
        # The base-href MUST match your repository name with trailing slashes
        run: npx ng build --configuration production --base-href "/media-alacrate-test/"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # This is the standard output path for modern Angular apps.
          # If your build fails here, check if the folder structure in /dist is different.
          path: './dist/media-alacarte/browser'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
